name: Module Structure Checks

on:
  push:
    paths:
      - 'scripts/build-smartcard-module.sh'
      - 'scripts/collect-smartcard-diagnostics.sh'
      - 'tests/test_smartcard_module_structure.sh'
      - '.github/workflows/module-structure.yml'
      - 'META-INF/**'
      - 'module.prop'
      - 'customize.sh'
      - 'tools/**'
      - 'system/**'
      - 'overlay-src/**'
  pull_request:
    paths:
      - 'scripts/build-smartcard-module.sh'
      - 'scripts/collect-smartcard-diagnostics.sh'
      - 'tests/test_smartcard_module_structure.sh'
      - '.github/workflows/module-structure.yml'
      - 'META-INF/**'
      - 'module.prop'
      - 'customize.sh'
      - 'tools/**'
      - 'system/**'
      - 'overlay-src/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate module structure
        run: bash tests/test_smartcard_module_structure.sh

      - name: Check shell syntax
        run: |
          bash -n \
            customize.sh \
            service.sh \
            tools/unity_install.sh \
            META-INF/com/google/android/update-binary \
            scripts/build-smartcard-module.sh \
            scripts/collect-smartcard-diagnostics.sh \
            tests/test_smartcard_module_structure.sh

      - name: Check build help without ROM extraction
        run: scripts/build-smartcard-module.sh --help
